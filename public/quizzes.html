<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>EduBridge - Quizzes</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="assets/css/main.css">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0056b2",
                        "background-light": "#f5f7f8",
                        "background-dark": "#0f1923",
                    },
                    fontFamily: {
                        "display": ["Inter"],
                        "sans": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">
    <div class="relative flex h-auto min-h-screen w-full flex-col overflow-x-hidden">
        <!-- Header -->
        <header class="h-16 border-b border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md sticky top-0 z-50 px-6 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <button id="sidebar-toggle" class="lg:hidden text-slate-600 dark:text-slate-400">
                    <span class="material-symbols-outlined">menu</span>
                </button>
                <div class="bg-primary rounded-lg size-10 flex items-center justify-center text-white">
                    <span class="material-symbols-outlined">school</span>
                </div>
                <div>
                    <h1 class="text-xl font-bold text-blue-800 dark:text-blue-300 leading-none">EduBridge</h1>
                    <p class="text-slate-500 dark:text-slate-400 text-xs font-medium mt-1">Learning Portal</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <button id="notification-bell" class="p-2 text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg relative">
                    <span class="material-symbols-outlined">notifications</span>
                    <span id="notification-dot" class="absolute top-2 right-2 size-2 bg-red-500 rounded-full ring-2 ring-white dark:ring-slate-900 hidden"></span>
                </button>
                <button id="mobile-menu-toggle" class="lg:hidden p-2 text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg">
                    <span class="material-symbols-outlined">menu</span>
                </button>
            </div>
        </header>

        <div class="flex flex-1">
            <!-- Sidebar Navigation -->
            <aside class="w-64 border-r border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 hidden lg:flex flex-col fixed left-0 top-16 bottom-0 z-40 py-6 px-4">
                <nav class="flex-1 flex flex-col gap-1">
                    <a class="flex items-center gap-3 px-3 py-2 rounded-lg transition-colors duration-200 text-sm font-medium text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800" href="index.html">
                        <span class="material-symbols-outlined text-[22px]">dashboard</span>
                        <span>Dashboard</span>
                    </a>
                    <a class="flex items-center gap-3 px-3 py-2 rounded-lg transition-colors duration-200 text-sm font-medium text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800" href="classes.html">
                        <span class="material-symbols-outlined text-[22px]">school</span>
                        <span>Classes</span>
                    </a>
                    <a class="flex items-center gap-3 px-3 py-2 rounded-lg transition-colors duration-200 text-sm font-medium text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800" href="notes.html">
                        <span class="material-symbols-outlined text-[22px]">description</span>
                        <span>Study Notes</span>
                    </a>
                    <a class="flex items-center gap-3 px-3 py-2 rounded-lg transition-colors duration-200 text-sm font-medium text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800" href="my_exams.html">
                        <span class="material-symbols-outlined text-[22px]">history_edu</span>
                        <span>Skill Checks</span>
                    </a>
                    <a class="flex items-center gap-3 px-3 py-2 rounded-lg transition-colors duration-200 text-sm font-medium text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800" href="chat.html">
                        <span class="material-symbols-outlined text-[22px]">chat</span>
                        <span>Chat</span>
                    </a>
                </nav>
            </aside>

            <!-- Main Content Area -->
            <main class="flex-1 lg:ml-64 overflow-y-auto fade-in">
                <div class="p-6 lg:p-8 max-w-7xl mx-auto w-full">
                    <div class="mb-8">
                        <h1 class="text-3xl font-black text-slate-900 dark:text-white tracking-tight">Quizzes & Assessments</h1>
                        <p class="text-slate-500 dark:text-slate-400 mt-2">Test your knowledge and track your progress.</p>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        <div class="bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 p-6 flex flex-col gap-4 shadow-sm hover:shadow-md transition-all">
                            <div class="flex justify-between items-start">
                                <div class="size-12 bg-primary/10 text-primary rounded-xl flex items-center justify-center">
                                    <span class="material-symbols-outlined text-2xl">quiz</span>
                                </div>
                                <span class="text-xs font-bold text-slate-400 px-2 py-1 bg-slate-100 dark:bg-slate-800 rounded">Not Started</span>
                            </div>
                            <div>
                                <h3 class="text-lg font-bold text-slate-900 dark:text-slate-100">Intro to Data Structures</h3>
                                <p class="text-sm text-slate-500 mt-1">20 Questions • 30 Minutes</p>
                            </div>
                            <button data-track="quizzesStarted" data-detail="Intro to Data Structures" onclick="window.open('https://forms.gle/new', '_blank')" class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-3 rounded-lg transition-all">Start Quiz</button>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Scripts -->
    <script src="assets/js/analytics.js"></script>
    <script type="module" src="assets/js/layout.js"></script>
</body>
</html>
